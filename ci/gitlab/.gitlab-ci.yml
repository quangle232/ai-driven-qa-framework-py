# SAMPLE — GitLab CI/CD (uv + pytest). Copy to repo ROOT as .gitlab-ci.yml.
# CI/CD variables (Masked): AUTH_URL, APP_URL, APP_USER, APP_PASS, JIRA_*, ANTHROPIC_API_KEY.
stages: [test, report]

variables:
  CI_PROVIDER: gitlab-ci
  test_env: test

.base:
  image: mcr.microsoft.com/playwright/python:v1.48.0-jammy
  stage: test
  variables:
    MARKERS: "regression"
  before_script:
    - pip install -q uv
    - uv sync --extra dev
    - uv run playwright install chromium
    - uv run poe proto-gen
    - mkdir -p environments
    - |
      cat > "environments/.env.${test_env}" <<EOF
      AUTH_URL=${AUTH_URL}
      APP_URL=${APP_URL}
      APP_USER=${APP_USER}
      APP_PASS=${APP_PASS}
      EOF
  script:
    - set +e
    - uv run pytest -m "$MARKERS" --reruns 2; TEST_EXIT=$?
    - set -e
    - uv run aiqa report-all || true
    - '[ -f test-output/ai/ci-summary.md ] && cat test-output/ai/ci-summary.md || true'
    - exit $TEST_EXIT
  artifacts:
    when: always
    expire_in: 1 week
    paths: [test-output]

regression:
  extends: .base
  variables:
    MARKERS: "regression"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
      allow_failure: true

smoke:
  extends: .base
  variables:
    MARKERS: "smoke and not mobile_native and not bugs"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
